<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Vector Eyes Pet</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b0f18" />
  <style>
    html, body { height:100%; margin:0; background:#0b0f18; overflow:hidden; }
    #stage { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
    canvas { width:min(92vw, 900px); height:auto; image-rendering: pixelated; }
    #hud {
      position:fixed; left:0; right:0; bottom:18px;
      display:flex; justify-content:center; gap:14px; pointer-events:none;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }
    .btn {
      pointer-events:auto;
      width:64px; height:64px; border-radius:999px;
      background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.18);
      display:flex; align-items:center; justify-content:center;
      color:#dbe7ff; font-size:26px; user-select:none;
      backdrop-filter: blur(8px);
    }
    .btn:active { transform: scale(0.98); }
    #dot {
      position:fixed; top:16px; right:16px; width:12px; height:12px; border-radius:999px;
      background:#3a4a6d; border:1px solid rgba(255,255,255,0.15);
    }
    /* state colors: idle / listening / thinking / speaking */
    .idle { background:#3a4a6d; }
    .listening { background:#46c2ff; }
    .thinking { background:#f7c948; }
    .speaking { background:#66e3a2; }
    .error { background:#ff5c7a; }
  </style>
</head>
<body>
  <div id="stage">
    <canvas id="c" width="520" height="220" aria-label="Vector-style eyes"></canvas>
  </div>

  <div id="dot" class="idle" title="status"></div>

  <div id="hud">
    <div class="btn" id="mic" title="Hold to talk">🎤</div>
    <div class="btn" id="mute" title="Mute/unmute">🔊</div>
  </div>

<script>
/** ---------------------------
 *  CONFIG
 *  ---------------------------
 *  1) Deploy backend (Cloudflare Worker) and set API_BASE to its URL.
 *  2) This frontend is English-only by design.
 */
const API_BASE = "https://mau-api.kunalmekale55.workers.dev/"; // e.g. https://your-worker.yourname.workers.dev

/** ---------------------------
 *  Service Worker (optional offline caching for UI only)
 *  --------------------------- */
if ("serviceWorker" in navigator) navigator.serviceWorker.register("./sw.js");

/** ---------------------------
 *  Vector-ish Eye Renderer (pixel-ish rounded rectangles)
 *  --------------------------- */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const dot = document.getElementById("dot");

const state = {
  status: "idle",          // idle|listening|thinking|speaking|error
  baseMood: "calm",        // calm|sleepy|playful|bored
  overlayEmotion: null,    // happy|curious|annoyed|surprised|sad|sleepy (short-lived)
  overlayUntil: 0,

  // internal drives (0..1)
  energy: 0.78,
  boredom: 0.10,

  // animation signals
  blink: 0,                // 0 open -> 1 closed
  blinkTarget: 0,
  blinkSpeed: 0.18,
  pupilX: 0, pupilY: 0,    // -1..1
  pupilTX: 0, pupilTY: 0,
  pupilEase: 0.08,
  pupilTimer: 0,

  // speaking motion
  speakPulse: 0
};

function setStatus(s) {
  state.status = s;
  dot.className = s;
}

function setOverlay(emotion, seconds=3) {
  state.overlayEmotion = emotion;
  state.overlayUntil = performance.now() + seconds * 1000;
}

/** Mood drift loop (feels alive even without chat) */
setInterval(() => {
  // slow drift
  state.energy = clamp(state.energy - 0.003, 0.05, 1.0);
  state.boredom = clamp(state.boredom + 0.004, 0.0, 1.0);

  // choose base mood
  if (state.energy < 0.28) state.baseMood = "sleepy";
  else if (state.boredom > 0.75) state.baseMood = "bored";
  else state.baseMood = "calm";

  // occasional cute idle action
  if (state.baseMood === "bored" && Math.random() < 0.35) {
    setOverlay("curious", 2.0);
    state.boredom = clamp(state.boredom - 0.25, 0, 1);
  }
}, 2500);

/** Blink scheduler */
setInterval(() => {
  // Vector-like: irregular blink; sleepy = more/lower lids, playful = faster
  let p = 0.85;
  if (state.baseMood === "sleepy") p = 0.65;
  if (state.baseMood === "bored") p = 0.75;

  if (Math.random() < p) {
    state.blinkTarget = 1;
    setTimeout(() => state.blinkTarget = 0, 120 + Math.random()*80);
    if (Math.random() < 0.18) { // occasional double blink
      setTimeout(() => { state.blinkTarget = 1; setTimeout(()=>state.blinkTarget=0, 90); }, 240);
    }
  }
}, 2800);

/** Pupil saccades */
setInterval(() => {
  // if listening/thinking -> center attention
  if (state.status === "listening" || state.status === "thinking") {
    state.pupilTX = (Math.random()*0.2 - 0.1);
    state.pupilTY = (Math.random()*0.2 - 0.1);
    return;
  }
  // calm drift
  const r = state.baseMood === "sleepy" ? 0.25 : 0.55;
  state.pupilTX = (Math.random()*2 - 1) * r;
  state.pupilTY = (Math.random()*2 - 1) * (r * 0.55);
}, 900);

/** Main render loop */
function frame() {
  const now = performance.now();

  // overlay expiry
  if (state.overlayEmotion && now > state.overlayUntil) state.overlayEmotion = null;

  // animate blink
  state.blink += (state.blinkTarget - state.blink) * state.blinkSpeed;

  // animate pupil
  state.pupilX += (state.pupilTX - state.pupilX) * state.pupilEase;
  state.pupilY += (state.pupilTY - state.pupilY) * state.pupilEase;

  // speaking pulse (tiny bounce)
  state.speakPulse *= 0.92;

  drawEyes();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

function drawEyes() {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0,0,w,h);

  // background (match body)
  ctx.fillStyle = "#0b0f18";
  ctx.fillRect(0,0,w,h);

  // pick current “expression” parameters from base mood + overlay
  const expr = computeExpression();

  // two eyes positions
  const L = {x: w*0.36, y: h*0.52};
  const R = {x: w*0.64, y: h*0.52};

  // draw eyes (Vector-ish: rounded rects)
  drawEye(L, expr, true);
  drawEye(R, expr, false);
}

function computeExpression() {
  // defaults
  let lid = 0.05;     // 0 open, 1 closed
  let brow = 0.0;     // -1 sad, +1 angry tilt
  let wide = 0.0;     // widen eyes
  let pupil = 1.0;    // pupil size multiplier
  let glow = 1.0;     // brightness

  // base mood
  if (state.baseMood === "sleepy") { lid = 0.55; pupil = 0.9; glow = 0.85; }
  if (state.baseMood === "bored")  { lid = 0.25; pupil = 0.95; glow = 0.95; }

  // status attention
  if (state.status === "listening") { wide = 0.16; lid = Math.min(lid, 0.08); pupil = 1.1; }
  if (state.status === "thinking")  { wide = 0.08; pupil = 1.05; glow = 1.05; }

  // overlay emotion (short reaction)
  switch (state.overlayEmotion) {
    case "happy":      lid = Math.min(lid, 0.12); glow = 1.25; break;
    case "curious":    wide = 0.22; pupil = 1.15; glow = 1.10; break;
    case "annoyed":    lid = Math.max(lid, 0.28); brow = 0.55; glow = 0.95; break;
    case "surprised":  wide = 0.30; lid = Math.min(lid, 0.02); pupil = 1.25; glow = 1.20; break;
    case "sad":        lid = Math.max(lid, 0.22); brow = -0.35; glow = 0.85; break;
    case "sleepy":     lid = Math.max(lid, 0.62); glow = 0.80; break;
  }

  // blink closure
  lid = clamp(lid + state.blink * 0.95, 0, 0.98);

  return { lid, brow, wide, pupil, glow };
}

function drawEye(pos, expr, isLeft) {
  const eyeW = 128 + expr.wide * 18;
  const eyeH = 92  + expr.wide * 12;
  const radius = 18;

  // speaking bounce
  const bounce = state.speakPulse * 3;

  // eye glow color (Vector-ish cyan)
  const baseC = 210; // hue-ish via RGB mix (simple)
  const bright = clamp(0.65 * expr.glow, 0.45, 0.95);

  // outer eye shape
  ctx.save();
  ctx.translate(pos.x, pos.y + bounce);

  // eye white/cyan fill
  ctx.fillStyle = `rgba(90, 220, 255, ${bright})`;
  roundRect(ctx, -eyeW/2, -eyeH/2, eyeW, eyeH, radius);
  ctx.fill();

  // pupil offset
  const px = state.pupilX * 16 * (isLeft ? 1 : 1);
  const py = state.pupilY * 10;

  const pupilSize = 18 * expr.pupil;
  ctx.fillStyle = "rgba(10, 16, 28, 0.95)";
  roundRect(ctx, px - pupilSize/2, py - pupilSize/2, pupilSize, pupilSize, 6);
  ctx.fill();

  // tiny highlight
  ctx.fillStyle = "rgba(255,255,255,0.65)";
  roundRect(ctx, px - pupilSize*0.25, py - pupilSize*0.28, 5, 5, 2);
  ctx.fill();

  // eyelid cover from top
  if (expr.lid > 0) {
    const coverH = expr.lid * (eyeH + 10);
    ctx.fillStyle = "#0b0f18";
    ctx.fillRect(-eyeW/2 - 2, -eyeH/2 - 6, eyeW + 4, coverH);
  }

  // eyebrow line (annoyed/sad tilt)
  if (Math.abs(expr.brow) > 0.05) {
    ctx.strokeStyle = "rgba(220,240,255,0.75)";
    ctx.lineWidth = 4;
    ctx.beginPath();
    const y = -eyeH/2 - 14;
    const tilt = expr.brow * 10 * (isLeft ? 1 : -1);
    ctx.moveTo(-eyeW/2 + 8, y + tilt);
    ctx.lineTo( eyeW/2 - 8, y - tilt);
    ctx.stroke();
  }

  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  const rr = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+rr, y);
  ctx.arcTo(x+w, y,   x+w, y+h, rr);
  ctx.arcTo(x+w, y+h, x,   y+h, rr);
  ctx.arcTo(x,   y+h, x,   y,   rr);
  ctx.arcTo(x,   y,   x+w, y,   rr);
  ctx.closePath();
}

function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

/** ---------------------------
 *  Voice: browser STT (when available) + browser TTS
 *  --------------------------- */
let muted = false;

document.getElementById("mute").addEventListener("click", () => {
  muted = !muted;
  document.getElementById("mute").textContent = muted ? "🔇" : "🔊";
  if (muted) speechSynthesis.cancel();
});

function speak(text) {
  if (muted) return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US";
    u.rate = 1.02;
    u.pitch = 1.03;
    u.onstart = () => { setStatus("speaking"); state.speakPulse = 1.0; setOverlay("happy", 1.4); };
    u.onend   = () => { setStatus("idle"); };
    speechSynthesis.speak(u);
  } catch {
    setStatus("idle");
  }
}

/** Push-to-talk using Web Speech API (varies by device/browser).
 *  If it fails, we fall back to a simple prompt input.
 */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec = null;
if (SpeechRecognition) {
  rec = new SpeechRecognition();
  rec.lang = "en-US";
  rec.interimResults = false;
  rec.maxAlternatives = 1;

  rec.onstart = () => { setStatus("listening"); setOverlay("curious", 2.0); };
  rec.onerror = () => { setStatus("error"); setOverlay("sad", 2.0); setTimeout(()=>setStatus("idle"), 900); };
  rec.onend = () => { if (state.status === "listening") setStatus("idle"); };

  rec.onresult = async (e) => {
    const text = e.results?.[0]?.[0]?.transcript?.trim();
    if (!text) { setStatus("idle"); return; }
    await handleUserText(text);
  };
}

const micBtn = document.getElementById("mic");
let holding = false;

micBtn.addEventListener("pointerdown", async () => {
  holding = true;
  if (rec) {
    try { rec.start(); } catch {}
  } else {
    // fallback: type once
    const typed = prompt("Type what you want to say (English):");
    if (typed && typed.trim()) await handleUserText(typed.trim());
  }
});

micBtn.addEventListener("pointerup", () => {
  holding = false;
  if (rec) {
    try { rec.stop(); } catch {}
  }
});

/** ---------------------------
 *  Online AI Call (secure backend)
 *  --------------------------- */
async function handleUserText(userText) {
  setStatus("thinking");
  setOverlay("curious", 2.0);

  try {
    const r = await fetch(`${API_BASE}/api/respond`, {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({
        userText,
        // tiny memory (keep minimal, eyes-only UI)
        context: {
          baseMood: state.baseMood,
          energy: state.energy
        }
      })
    });

    if (!r.ok) throw new Error("bad response");
    const data = await r.json();

    // Expect: { text: "...", emotion: "happy|curious|annoyed|surprised|sad|sleepy", energyDelta?: number }
    const text = (data.text || "").trim();
    const emo = (data.emotion || "calm").toLowerCase();

    if (data.energyDelta !== undefined) {
      state.energy = clamp(state.energy + Number(data.energyDelta), 0.05, 1.0);
    }

    // apply emotion overlay
    if (["happy","curious","annoyed","surprised","sad","sleepy"].includes(emo)) {
      setOverlay(emo, 3.0);
    } else {
      setOverlay("happy", 1.2);
    }

    // boredom reduces after interaction
    state.boredom = clamp(state.boredom - 0.25, 0, 1);

    // speak
    speak(text);

  } catch (err) {
    setStatus("error");
    setOverlay("sad", 2.0);
    setTimeout(() => setStatus("idle"), 1200);
    speak("Sorry—my brain is not reachable right now.");
  }
}
</script>
</body>
</html>
